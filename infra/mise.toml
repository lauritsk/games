[tools]
"pipx:ansible-core" = "2.20.4"
"pipx:ansible-lint" = "26.4.0"
"pipx:yamlfmt" = "1.1.1"
"pipx:yamllint" = "1.38.0"
uv = "0.11.7"

[tasks.setup]
description = "Install required ansible collections before deployment"
run = "ansible-galaxy collection install containers.podman"

[tasks.deploy]
description = "Deploy games infrastructure with Ansible"
depends = ["setup"]
run = "ansible-playbook playbook.yaml"
