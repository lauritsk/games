---
- name: Deploy games quadlet
  hosts: all
  become: true

  tasks:
    - name: Ensure podman is installed
      ansible.builtin.package:
        name: podman
        state: present

    - name: Ensure quadlet directory exists
      ansible.builtin.file:
        path: /etc/containers/systemd
        state: directory
        mode: '0755'

    - name: Ensure games quadlet is installed
      ansible.builtin.copy:
        src: games.container
        dest: /etc/containers/systemd/games.container
        mode: '0644'

    - name: Ensure podman auto updates are enabled
      ansible.builtin.systemd:
        name: podman-auto-update.timer
        enabled: true
        state: started

    - name: Pull latest games image
      ansible.builtin.shell: |
        set -euo pipefail
        image="docker.io/lauritsk/games:latest"
        format='{{ "{{" }}.Id{{ "}}" }}'
        before="$(
          podman image inspect "$image" --format "$format" 2>/dev/null || true
        )"
        podman pull "$image"
        after="$(podman image inspect "$image" --format "$format")"
        if [ "$before" = "$after" ]; then
          echo "__image_unchanged__"
        else
          echo "__image_changed__"
        fi
      args:
        executable: /bin/bash
      register: games_image_pull
      changed_when: "'__image_changed__' in games_image_pull.stdout"

    - name: Ensure Caddyfile is installed
      ansible.builtin.copy:
        src: Caddyfile
        dest: /etc/caddy/Caddyfile
        mode: '0644'
        backup: true
        validate: /usr/bin/caddy validate --config %s
      notify: Reload caddy

    - name: Ensure games service is enabled and restarted
      ansible.builtin.systemd:
        name: games.service
        enabled: true
        state: restarted
        daemon_reload: true

  handlers:
    - name: Reload caddy
      ansible.builtin.systemd:
        name: caddy.service
        state: reloaded
        enabled: true
        daemon_reload: true
