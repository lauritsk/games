[tools]
bun = "1.3.13"
"npm:prettier" = "3.6.2"

[tasks.dev]
description = "Run the web app dev server"
run = "bun run dev"

[tasks.build]
description = "Build the web app"
run = "bun run build"

[tasks.build-single]
description = "Build the web app as one standalone HTML file"
run = "bun run build:single"

[tasks.typecheck]
description = "Typecheck the app"
run = "bun run typecheck"

[tasks.format]
description = "Format source files"
run = "prettier --write ."

[tasks.format-check]
description = "Check source formatting"
run = "prettier --check ."

[tasks.lint]
description = "Run formatting and type checks"
run = "prettier --check . && bun run typecheck"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks.test-e2e]
description = "Run Playwright browser tests"
run = "bun run test:e2e"

[tasks.test-watch]
description = "Run tests in watch mode"
run = "bun run test:watch"

[tasks.check]
description = "Format-check, typecheck, test, and build"
run = "mise run format-check && bun run check"
