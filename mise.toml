[env]
HK_MISE = 1

[tools]
bun = "1.3.13"
hk = "1.44.1"
pkl = "0.31.1"
"npm:oxlint" = "1.61.0"
"npm:oxfmt" = "0.46.0"
cocogitto = "7.0.0"

[hooks]
postinstall = "hk install --mise"

[tasks.dev]
description = "Run the web app dev server"
run = "bun run dev"

[tasks.build]
description = "Build the web app"
run = "bun run build"

[tasks."build:single"]
description = "Build the web app as one standalone HTML file"
run = "bun run build:single"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "hk check --all"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks."test:e2e"]
description = "Run Playwright browser tests"
depends = ["build"]
run = "bun run test:e2e"

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "bun run test:watch"

[tasks."docker:build"]
description = "Build latest Docker Hub image"
run = "docker build --build-arg BUN_VERSION=$(mise current bun) -t docker.io/lauritsk/games:latest ."

[tasks."docker:push"]
description = "Push latest Docker image to Docker Hub"
depends = ["docker:build"]
run = "docker push docker.io/lauritsk/games:latest"

[tasks."docker:up"]
description = "Run Docker Compose with Bun version from mise"
run = "BUN_VERSION=$(mise current bun) docker compose up --build"

[tasks.check]
description = "Run version check, hk checks, tests, and build"
depends = ["lint", "test", "build", "test:e2e"]
