[tools]
bun = "1.3.13"
"npm:oxlint" = "1.61.0"
"npm:oxfmt" = "0.46.0"

[tasks.dev]
description = "Run the web app dev server"
run = "bun run dev"

[tasks.build]
description = "Build the web app"
run = "bun run build"

[tasks.build-single]
description = "Build the web app as one standalone HTML file"
run = "bun run build:single"

[tasks.typecheck]
description = "Typecheck the app"
run = "bun run typecheck"

[tasks.format]
description = "Format source files"
run = "oxfmt --write ."

[tasks.format-check]
description = "Check source formatting"
run = "oxfmt --check ."

[tasks.lint]
description = "Run oxlint and type checks"
run = "oxlint . --deny-warnings && bun run typecheck"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks.test-e2e]
description = "Run Playwright browser tests"
run = "bun run test:e2e"

[tasks.test-watch]
description = "Run tests in watch mode"
run = "bun run test:watch"

[tasks.check]
description = "Format-check, lint, typecheck, test, and build"
run = "mise run format-check && mise run lint && bun run check"
