[env]
HK_MISE = 1

[tools]
bun = "1.3.13"
hk = "1.44.1"
pkl = "0.31.1"
"npm:oxlint" = "1.61.0"
"npm:oxfmt" = "0.46.0"
cocogitto = "7.0.0"

[hooks]
postinstall = "hk install --mise"

[tasks.dev]
description = "Run the web app dev server"
run = "bun run dev"

[tasks."db:migrate"]
description = "Create or migrate the Bun SQLite sync database"
run = "bun run src/server/migrate.ts"

[tasks."db:generate"]
description = "Generate Drizzle SQLite migrations"
run = "bunx --bun drizzle-kit generate"

[tasks.build]
description = "Build the web app"
run = "bun run build"

[tasks."build:single"]
description = "Build the web app as one standalone HTML file"
run = "bun run build:single"

[tasks."build:server"]
description = "Build the Bun server bundle into a temporary directory"
run = "rm -rf /tmp/games-server-build && bun build ./src/server/index.ts --outdir /tmp/games-server-build --target bun --root . --entry-naming='server.[ext]' && cp -R migrations /tmp/games-server-build/migrations"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "hk check --all"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.typecheck]
description = "Run TypeScript type checks"
run = "bun run typecheck"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks."test:e2e"]
description = "Run Playwright browser tests"
depends = ["build"]
run = "bun run test:e2e"

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "bun run test:watch"

[tasks."docker:push"]
description = "Build and push latest multi-arch Docker image to Docker Hub"
run = "docker buildx build --platform linux/amd64,linux/arm64 --build-arg BUN_VERSION=$(mise current bun) -t docker.io/lauritsk/games:latest --push ."

[tasks."docker:up"]
description = "Run Docker Compose with Bun version from mise"
run = "BUN_VERSION=$(mise current bun) docker compose up --build"

[tasks.check]
description = "Run version check, hk checks, tests, and build"
depends = ["lint", "test", "build", "build:server", "test:e2e"]
